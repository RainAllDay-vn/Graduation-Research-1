services:
  neo4j:
    image: neo4j:5.15-community
    container_name: neo4j
    ports:
      - "7474:7474" # HTTP (Browser)
      - "7687:7687" # Bolt (Python driver)
    environment:
      - NEO4J_AUTH=neo4j/password-to-kg
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

  kgtk:
    image: uscisii2/kgtk:latest
    container_name: kgtk
    volumes:
      - .:/data
    working_dir: /data
    user: root
    environment:
      - CHOWN_CONTENT=yes
    stdin_open: true
    tty: true

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
